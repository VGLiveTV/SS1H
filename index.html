<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VG TV</title>
    <link rel="icon" href="https://raw.githubusercontent.com/VGLiveTV/vgtv3/refs/heads/main/fav.png">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-border: #334155;
            --accent: #e50914;
            --text: #f8fafc;
            --sub-text: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- Navbar & Filters (Desktop) --- */
        .nav { 
            padding: 15px 20px; 
            background: #0b1120; 
            border-bottom: 2px solid var(--accent); 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .nav-logo { height: 35px; object-fit: contain; }

        #searchInput { flex: 1; min-width: 150px; }

        .filter-group { 
            display: flex; 
            gap: 10px; 
            flex: 1;
            min-width: 250px;
        }

        select, input { 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid var(--card-border); 
            background: #000; 
            color: #fff; 
            outline: none; 
            font-size: 14px; 
            cursor: pointer;
            transition: 0.3s;
        }
        
        select { flex: 1; width: 100%; }
        select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(229, 9, 20, 0.4); }

        /* --- Grid Layout --- */
        .grid { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; 
            align-content: start;
        }

        .card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            border: 1px solid var(--card-border); 
            cursor: pointer;
            transition: all 0.2s ease; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { 
            border-color: var(--accent); 
            transform: translateY(-4px); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }

        .card img { 
            width: 70px; 
            height: 70px; 
            object-fit: contain; 
            background: #fff; 
            border-radius: 8px; 
            padding: 5px; 
            margin-bottom: 12px; 
        }

        .card-title { 
            font-size: 14px; 
            font-weight: bold; 
            width: 100%;
            overflow: hidden; 
            white-space: nowrap; 
            text-overflow: ellipsis; 
            margin-bottom: 8px;
        }

        .card-badges {
            display: flex;
            gap: 5px;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            color: var(--sub-text);
        }
        .badge.category { border-left: 2px solid var(--accent); }
        .badge.language { border-left: 2px solid #3b82f6; }

        .status-msg { grid-column: 1/-1; text-align: center; color: var(--sub-text); margin-top: 50px; font-size: 16px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 650px) {
            .nav { 
                display: grid;
                grid-template-columns: auto 1fr;
                padding: 12px 10px; 
                gap: 10px;
            }
            .nav-logo { height: 42px; }
            #searchInput { width: 100%; font-size: 15px; padding: 10px 12px; }
            .filter-group { 
                grid-column: 1 / -1;
                display: flex;
                flex-direction: row; 
                width: 100%; 
                gap: 10px;
            }
            select { font-size: 14px; padding: 10px; }
            .grid { padding: 15px 10px; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .card { padding: 12px; }
            .card img { width: 60px; height: 60px; }
        }

        /* --- MODAL STYLES --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            transform: translateY(30px) scale(0.95);
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        .modal-header img {
            width: 60px; height: 60px; object-fit: contain; background: #fff; border-radius: 8px; padding: 4px;
        }
        .modal-header h2 { font-size: 18px; color: #fff; }
        
        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: none; border: none;
            color: var(--sub-text); font-size: 28px;
            cursor: pointer; line-height: 1; transition: 0.2s;
        }
        .close-btn:hover { color: var(--accent); }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-box {
            background: #0b1120;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 12px 15px;
        }
        .detail-label {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            display: block;
        }
        .detail-value {
            font-size: 13px;
            color: #e2e8f0;
            font-family: monospace;
            word-break: break-all;
            user-select: all; 
        }
        .detail-value.scrollable {
            max-height: 80px;
            overflow-y: auto;
        }
        
        .play-btn {
            margin-top: 10px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .play-btn:hover { background: #ff0a16; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="nav">
        <img src="https://raw.githubusercontent.com/VGLiveTV/vgtv3/refs/heads/main/logo.png" alt="VG TV Logo" class="nav-logo">
        
        <input type="text" id="searchInput" placeholder="Search channels...">
        
        <div class="filter-group">
            <select id="catFilter">
                <option value="all">All Categories</option>
            </select>
            <select id="langFilter">
                <option value="all">All Languages</option>
                <option value="Hindi" selected>Hindi</option>
            </select>
        </div>
    </div>

    <div id="grid" class="grid">
        <div class="status-msg">Loading channels...</div>
    </div>

    <div id="channelModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <img id="modalImg" src="" alt="Logo">
                <h2 id="modalTitle">Channel Name</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalDetails">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://allrounderid.pages.dev/api/jiotv.json";
        const COOKIE_URL = "https://raw.githubusercontent.com/vaathala00/jow/main/output.json";
        
        let allChannels = [];
        let globalLiveCookie = "Fetching live cookie...";
        
        // DOM Elements
        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const catFilter = document.getElementById('catFilter');
        const langFilter = document.getElementById('langFilter');
        const modal = document.getElementById('channelModal');

        // 1. Fetch Data on load (Both Cookie and Channels)
        async function fetchChannels() {
            try {
                // Fetch Cookie First strictly from JSON
                try {
                    const cookieRes = await fetch(COOKIE_URL);
                    if (cookieRes.ok) {
                        const cookieData = await cookieRes.json();
                        if (cookieData && cookieData.length > 0 && cookieData[0].cookie) {
                            globalLiveCookie = cookieData[0].cookie;
                        } else {
                            globalLiveCookie = "No cookie found in JSON";
                        }
                    }
                } catch (e) {
                    console.error("Failed to fetch live cookie", e);
                    globalLiveCookie = "Error fetching cookie";
                }

                // Fetch Channels Second
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("API Failed");
                
                const raw = await res.json();
                allChannels = formatData(raw);
                
                allChannels.sort((a, b) => a.name.localeCompare(b.name));
                
                populateFilters(); 
                applyFilters();
            } catch (err) {
                grid.innerHTML = `<div class="status-msg" style="color:red;">Failed to Load Channels.<br>Check Internet Connection.</div>`;
                console.error(err);
            }
        }

        function formatData(data) {
            return data.map(c => ({
                name: c.channel_name || "Unknown Channel",
                logo: c.channel_logo || "https://via.placeholder.com/70?text=TV",
                category: c.channel_genre || c.category || "Others",
                language: c.channel_language || c.language || "Others",
                url: c.channel_url || "No URL Provided",
                keyId: c.keyId || "Null",
                key: c.key || "Null"
            }));
        }

        // 2. Populate Dropdowns (WITH COUNTS)
        function populateFilters() {
            const currentCat = catFilter.value;
            const currentLang = langFilter.value;

            const catBaseList = allChannels.filter(c => currentLang === "all" ? true : c.language === currentLang);
            const catCounts = {};
            catBaseList.forEach(c => catCounts[c.category] = (catCounts[c.category] || 0) + 1);
            
            let catHTML = `<option value="all">All Categories (${catBaseList.length})</option>`;
            Object.keys(catCounts).sort().forEach(cat => {
                 catHTML += `<option value="${cat}" ${cat === currentCat ? 'selected' : ''}>${cat} (${catCounts[cat]})</option>`;
            });
            catFilter.innerHTML = catHTML;

            const langBaseList = allChannels.filter(c => currentCat === "all" ? true : c.category === currentCat);
            const langCounts = {};
            langBaseList.forEach(c => langCounts[c.language] = (langCounts[c.language] || 0) + 1);
            
            let langHTML = `<option value="all">All Languages (${langBaseList.length})</option>`;
            Object.keys(langCounts).sort().forEach(lang => {
                langHTML += `<option value="${lang}" ${lang === currentLang ? 'selected' : ''}>${lang} (${langCounts[lang]})</option>`;
            });
            langFilter.innerHTML = langHTML;
        }

        // 3. Render the Grid
        function renderGrid(channelsToRender) {
            grid.innerHTML = ""; 

            if (channelsToRender.length === 0) {
                grid.innerHTML = `<div class="status-msg">No channels match your filters.</div>`;
                return;
            }

            channelsToRender.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(c);

                card.innerHTML = `
                    <img src="${c.logo}" alt="logo" loading="lazy" onerror="this.src='https://via.placeholder.com/70?text=TV'">
                    <div class="card-title">${c.name}</div>
                    <div class="card-badges">
                        <span class="badge category">${c.category}</span>
                        <span class="badge language">${c.language}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 4. Modal Functions & UI Details
        function openModal(channel) {
            document.getElementById('modalImg').src = channel.logo;
            document.getElementById('modalTitle').innerText = channel.name;

            let cleanUrl = channel.url;
            if (cleanUrl && cleanUrl.includes('.mpd')) {
                cleanUrl = cleanUrl.substring(0, cleanUrl.indexOf('.mpd') + 4);
            } else if (cleanUrl && cleanUrl.includes('?')) {
                cleanUrl = cleanUrl.split('?')[0]; 
            }

            const modalDetails = document.getElementById('modalDetails');
            modalDetails.innerHTML = `
                <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                    <span class="badge category">${channel.category}</span>
                    <span class="badge language">${channel.language}</span>
                </div>
                
                <div class="detail-box">
                    <span class="detail-label">Stream URL</span>
                    <div class="detail-value">${cleanUrl}</div>
                </div>

                <div class="detail-box">
                    <span class="detail-label">Key ID (KID)</span>
                    <div class="detail-value">${channel.keyId}</div>
                </div>

                <div class="detail-box">
                    <span class="detail-label">Key</span>
                    <div class="detail-value">${channel.key}</div>
                </div>

                <div class="detail-box">
                    <span class="detail-label">Live Auth Cookie (Fetched from JSON)</span>
                    <div class="detail-value scrollable">${globalLiveCookie}</div>
                </div>

                <button class="play-btn" onclick='playInNewTab(${JSON.stringify(channel).replace(/'/g, "&apos;")})'>
                    ▶ Play Channel
                </button>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto'; 
        }

        modal.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 5. Handle Filtering
        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedCat = catFilter.value;
            const selectedLang = langFilter.value;

            const filteredChannels = allChannels.filter(c => {
                const matchesSearch = c.name.toLowerCase().includes(searchTerm);
                const matchesCat = (selectedCat === "all") || (c.category === selectedCat);
                const matchesLang = (selectedLang === "all") || (c.language === selectedLang);
                return matchesSearch && matchesCat && matchesLang;
            });

            renderGrid(filteredChannels);
            populateFilters(); 
        }

        searchInput.addEventListener('input', applyFilters);
        catFilter.addEventListener('change', applyFilters);
        langFilter.addEventListener('change', applyFilters);

        // 6. BLOB PLAYER - Independently fetches fresh cookie in the new tab
        function playInNewTab(channel) {
            let cleanUrl = channel.url;
            if (cleanUrl && cleanUrl.includes('.mpd')) {
                cleanUrl = cleanUrl.substring(0, cleanUrl.indexOf('.mpd') + 4);
            } else if (cleanUrl && cleanUrl.includes('?')) {
                cleanUrl = cleanUrl.split('?')[0]; 
            }

            const safeKid = JSON.stringify(channel.keyId || "Null");
            const safeKey = JSON.stringify(channel.key || "Null");
            const safeUrl = JSON.stringify(cleanUrl);
            const safeName = JSON.stringify(channel.name || "VG TV Player");

            const playerCode = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>${channel.name || 'VG TV Player'}</title>
  <link rel="icon" href="https://raw.githubusercontent.com/VGLiveTV/vgtv3/refs/heads/main/fav.png">
  <meta name="referrer" content="no-referrer">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"><\/script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .shaka-video-container {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
  </style>
</head>
<body>

  <div class="shaka-video-container" id="player-container">
    <video id="video" autoplay playsinline preload="metadata"></video>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) return;

      const videoEl = document.getElementById('video');
      const container = document.getElementById('player-container');

      const player = new shaka.Player(videoEl);
      const ui = new shaka.ui.Overlay(player, container, videoEl);

      ui.configure({
        addBigPlayButton: true,
        controlPanelElements: ['play_pause','time_and_duration','mute','volume','spacer','language','captions','picture_in_picture','quality','fullscreen'],
        seekBarColors: { base: 'rgba(255,255,255,0.3)', buffered: 'rgba(229,9,20,0.5)', played: '#e50914' }
      });

      const kid = ${safeKid};
      const key = ${safeKey};
      const streamUrl = ${safeUrl};

      let drmConfig = { clearKeys: {} };
      if (kid !== "Null" && key !== "Null") {
        drmConfig.clearKeys[kid] = key;
      }

      player.configure({
        drm: drmConfig,
        manifest: { defaultPresentationDelay: 5 },
        streaming: { safeSeekOffset: 5, bufferingGoal: 10, rebufferingGoal: 2, lowLatencyMode: true }
      });

      // INDEPENDENT FETCH: The player tab fetches its own fresh cookie to guarantee it never expires
      let cookieHeader = "";
      try {
        const cookieRes = await fetch("https://raw.githubusercontent.com/vaathala00/jow/main/output.json");
        const cookieData = await cookieRes.json();
        if (cookieData && cookieData.length > 0 && cookieData[0].cookie) {
            cookieHeader = cookieData[0].cookie;
        }
      } catch (e) {
        console.error("Failed to fetch fresh live cookie in new tab", e);
      }

      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';

        if (cookieHeader) {
          request.headers['Cookie'] = cookieHeader;

          if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
               type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
               !request.uris[0].includes('__hdnea__')) {
            const sep = request.uris[0].includes('?') ? '&' : '?';
            request.uris[0] += sep + cookieHeader;
          }
        }
      });

      try {
        await player.load(streamUrl);
        videoEl.play();
      } catch (e) {
        console.error("Stream Load Error:", e);
        if (e.code === 6001) { 
            player.configure({ drm: {} });
            try { await player.load(streamUrl); videoEl.play(); } catch(err){}
        }
      }
    });
  <\/script>
</body>
</html>`;

            const blob = new Blob([playerCode], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
        }

        // Start App
        fetchChannels();
    </script>
</body>
</html>
