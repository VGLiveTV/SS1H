<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports // Dillzy </title>
<meta name="referrer" content="no-referrer">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

.custom-watermark{
position:absolute;
z-index:40;
pointer-events:none;
top:65%;
left:6%;
transform:translateY(-50%);
font-size:11px;
font-weight:600;
color:rgba(255,255,255,0.12);
}

/* On-screen error logger for Mobile Debugging */
#error-log {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(220, 20, 60, 0.9);
    color: white;
    padding: 10px;
    border-radius: 5px;
    font-family: monospace;
    font-size: 12px;
    z-index: 9999;
    display: none;
    max-width: 90%;
    word-wrap: break-word;
}

@media(max-width:700px){
.custom-watermark{font-size:9px;top:60%;left:16%}
}
</style>
</head>
<body>

<div class="shaka-video-container" id="player-container">
<video id="video" playsinline preload="metadata"></video>
<div class="custom-watermark"> </div>
<div id="error-log"></div>
</div>

<script>
(function(){
  const CONFIG={
    streamUrl:"https://jiotvmblive.cdn.jio.com//bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
    keyId:"400131994b445d8c8817202248760fda",
    key:"2d56cb6f07a75b9aff165d534ae2bfc4",
    cookieUrl:"https://raw.githubusercontent.com/vaathala00/jow/main/output.json"
  };

  document.addEventListener("DOMContentLoaded",async()=>{

    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) {
        document.getElementById("error-log").style.display = "block";
        document.getElementById("error-log").innerText = "Browser not supported for Shaka Player.";
        return;
    }

    const video=document.getElementById("video");
    const container=document.getElementById("player-container");
    const errorLog = document.getElementById("error-log");

    const player=new shaka.Player();
    await player.attach(video);

    const ui=new shaka.ui.Overlay(player,container,video);

    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: [
        "mute",           
        "play_pause",     
        "time_and_duration", 
        "spacer",
        "quality",
        "picture_in_picture",
        "fullscreen"
      ],
      seekBarColors: {
        base: "white",
        buffered: "red", 
        played: "green"
      }
    });

    player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      manifest:{defaultPresentationDelay:5},
      streaming:{
        lowLatencyMode:true,
        bufferingGoal:10,
        rebufferingGoal:2,
        safeSeekOffset:5
      }
    });

    // Error Listener - Prints to screen for JioPages debugging
    player.addEventListener('error', (event) => {
        const error = event.detail;
        console.error('Error code', error.code, 'object', error);
        errorLog.style.display = "block";
        errorLog.innerText = `Shaka Error: ${error.code}\nIf 6012: CORS/Network Blocked by JioPages.\nIf 6001: DRM blocked.`;
    });

    let cookieValue="";

    try{
      const response=await fetch(CONFIG.cookieUrl,{cache:"no-store"});
      const rawText=await response.text();
      const match = rawText.match(/__hdnea__=[A-Za-z0-9~=/*_-]+/);
      if (match) {
        cookieValue = match[0];
      }
    }catch(e){
      errorLog.style.display = "block";
      errorLog.innerText = "Failed to fetch cookie JSON. Check adblocker.";
    }

    if(cookieValue){
      player.getNetworkingEngine().registerRequestFilter((type,request)=>{
        let urlCookie=cookieValue.startsWith("__hdnea__=")?cookieValue.substring(10):cookieValue;

        if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST||
        type===shaka.net.NetworkingEngine.RequestType.SEGMENT)&&
        !request.uris[0].includes("__hdnea__")){
          const sep=request.uris[0].includes("?")?"&":"?";
          request.uris[0]+=sep+"__hdnea__="+urlCookie;
        }
      });
    }

    try{
      await player.load(CONFIG.streamUrl);
      // Removed programmatic video.play(). You MUST tap the big play button manually.
    }catch(e){
        errorLog.style.display = "block";
        errorLog.innerText = `Load Error: ${e.message || "Unknown"}`;
    }

  });
})();
</script>
  
</body>
</html>
